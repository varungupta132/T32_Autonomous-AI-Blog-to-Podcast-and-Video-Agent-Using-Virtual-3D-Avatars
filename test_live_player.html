<!DOCTYPE html>
<html>
<head>
    <title>Test Live Player Avatars</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1e3c72;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .avatar-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            height: 400px;
            border: 3px solid #ddd;
        }
        .avatar-container.active {
            border-color: #2a5298;
            box-shadow: 0 0 30px rgba(42, 82, 152, 0.8);
        }
        .avatar-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .avatar-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
