<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Working Animated Podcast Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f5ff;
            border-color: #764ba2;
        }

        #audioFile {
            display: none;
        }

        .player-section {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .player-section.show {
            display: block;
        }

        .avatars-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            min-height: 400px;
        }

        .avatar-box.active {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.8); }
            50% { box-shadow: 0 0 60px rgba(118, 75, 162, 1); }
        }

        .avatar-canvas {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
        }

        .avatar-name {
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: #f5f5f5;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-weight: bold;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .wave-animation {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .avatar-box.active .wave-animation {
            opacity: 1;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3));
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Animated Podcast Player</h1>
            <p>Upload audio and watch avatars come to life</p>
        </div>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 4em; margin-bottom: 15px;">🎵</div>
                <h2 style="margin-bottom: 10px;">Drop your podcast audio here</h2>
                <p style="color: #666; margin-bottom: 15px;">or click to browse</p>
                <p style="color: #999; font-size: 0.9em;">Supports: MP3, WAV, OGG</p>
            </div>
            <input type="file" id="audioFile" accept="audio/*">
            <div class="status" id="uploadStatus"></div>
        </div>

        <!-- Player Section -->
        <div class="player-section" id="playerSection">
            <!-- Avatars -->
            <div class="avatars-container" id="avatarsContainer">
                <div class="avatar-box" id="avatar1">
                    <canvas class="avatar-canvas" id="canvas1"></canvas>
                    <div class="avatar-name">👨 Speaker 1 - Alex</div>
                    <div class="wave-animation">
                        <div class="wave"></div>
                    </div>
                </div>
                <div class="avatar-box" id="avatar2">
                    <canvas class="avatar-canvas" id="canvas2"></canvas>
                    <div class="avatar-name">👩 Speaker 2 - Sam</div>
                    <div class="wave-animation">
                        <div class="wave"></div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="control-buttons">
                    <button class="btn btn-primary" id="playBtn">
                        <span>▶️</span>
                        <span>Play</span>
                    </button>
                    <button class="btn btn-primary" id="pauseBtn" style="display:none;">
                        <span>⏸️</span>
                        <span>Pause</span>
                    </button>
                    <button class="btn btn-primary" id="stopBtn">
                        <span>⏹️</span>
                        <span>Stop</span>
                    </button>
                </div>

                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>

            <div class="status" id="playerStatus"></div>
        </div>
    </div>

    <script>
        let audioElement = null;
        let animationFrame = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let currentSpeaker = 1;
        let speakerInterval = null;

        const uploadArea = document.getElementById('uploadArea');
        const audioFile = document.getElementById('audioFile');
        const uploadStatus = document.getElementById('uploadStatus');
        const playerSection = document.getElementById('playerSection');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playerStatus = document.getElementById('playerStatus');

        // Initialize simple canvas avatars (no Three.js dependency)
        function initAvatars() {
            const canvases = ['canvas1', 'canvas2'];
            
            canvases.forEach((canvasId, index) => {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext('2d');
                
                // Set canvas size
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                // Draw avatar
                drawAvatar(ctx, canvas.width, canvas.height, index);
            });
        }

        function drawAvatar(ctx, width, height, index, mouthOpen = false) {
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Colors
            const skinColor = index === 0 ? '#ffdbac' : '#f4c2c2';
            const bodyColor = index === 0 ? '#4a90e2' : '#e24a90';
            const hairColor = index === 0 ? '#4a3728' : '#8b4513';
            
            // Draw body
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(centerX, centerY + 80, 60, 100, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw neck
            ctx.fillStyle = skinColor;
            ctx.fillRect(centerX - 20, centerY + 20, 40, 40);
            
            // Draw head
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(centerX, centerY - 20, 70, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw hair
            ctx.fillStyle = hairColor;
            ctx.beginPath();
            ctx.arc(centerX, centerY - 50, 75, Math.PI, Math.PI * 2);
            ctx.fill();
            
            // Draw ears
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.ellipse(centerX - 70, centerY - 20, 15, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(centerX + 70, centerY - 20, 15, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(centerX - 25, centerY - 30, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 25, centerY - 30, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw pupils
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX - 25, centerY - 30, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 25, centerY - 30, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw eyebrows
            ctx.strokeStyle = hairColor;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(centerX - 40, centerY - 50);
            ctx.lineTo(centerX - 10, centerY - 45);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(centerX + 40, centerY - 50);
            ctx.lineTo(centerX + 10, centerY - 45);
            ctx.stroke();
            
            // Draw nose
            ctx.strokeStyle = '#d4a574';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - 10);
            ctx.lineTo(centerX - 5, centerY + 5);
            ctx.lineTo(centerX + 5, centerY + 5);
            ctx.stroke();
            
            // Draw mouth
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (mouthOpen) {
                // Open mouth (talking)
                ctx.ellipse(centerX, centerY + 20, 25, 15, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#8b0000';
                ctx.fill();
            } else {
                // Closed mouth (smiling)
                ctx.arc(centerX, centerY + 10, 25, 0, Math.PI);
            }
            ctx.stroke();
        }

        // Animate avatars
        function animateAvatars() {
            const canvases = ['canvas1', 'canvas2'];
            
            canvases.forEach((canvasId, index) => {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext('2d');
                const avatarBox = document.getElementById(`avatar${index + 1}`);
                const isActive = avatarBox.classList.contains('active');
                
                // Redraw with animation
                const mouthOpen = isActive && Math.sin(Date.now() * 0.01) > 0;
                drawAvatar(ctx, canvas.width, canvas.height, index, mouthOpen);
            });
            
            if (audioElement && !audioElement.paused) {
                animationFrame = requestAnimationFrame(animateAvatars);
            }
        }

        // Upload handlers
        uploadArea.addEventListener('click', () => audioFile.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f0f5ff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '';
            if (e.dataTransfer.files.length > 0) {
                handleUpload(e.dataTransfer.files[0]);
            }
        });

        audioFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleUpload(e.target.files[0]);
            }
        });

        async function handleUpload(file) {
            try {
                showStatus(uploadStatus, 'Uploading audio...', 'info');

                const formData = new FormData();
                formData.append('audio', file);

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                showStatus(uploadStatus, '✓ Audio uploaded! Initializing player...', 'success');

                // Initialize player
                audioElement = new Audio(data.audio_url);
                
                audioElement.addEventListener('loadedmetadata', () => {
                    durationEl.textContent = formatTime(audioElement.duration);
                    showStatus(playerStatus, '✓ Ready to play!', 'success');
                });

                audioElement.addEventListener('timeupdate', updateProgress);
                audioElement.addEventListener('ended', handleEnded);

                // Show player section first
                playerSection.classList.add('show');
                
                // Initialize avatars after a short delay to ensure canvas is visible
                setTimeout(() => {
                    initAvatars();
                    showStatus(playerStatus, '✓ Avatars loaded! Ready to play!', 'success');
                }, 100);

            } catch (error) {
                showStatus(uploadStatus, 'Error: ' + error.message, 'error');
                console.error(error);
            }
        }

        // Playback controls
        playBtn.addEventListener('click', () => {
            audioElement.play();
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-flex';
            startSpeakerSimulation();
            animateAvatars();
        });

        pauseBtn.addEventListener('click', () => {
            audioElement.pause();
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-flex';
        });

        stopBtn.addEventListener('click', () => {
            audioElement.pause();
            audioElement.currentTime = 0;
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-flex';
            resetAvatars();
        });

        function startSpeakerSimulation() {
            let currentSpeaker = 1;
            
            const interval = setInterval(() => {
                if (audioElement.paused) {
                    clearInterval(interval);
                    resetAvatars();
                    return;
                }

                // Alternate speakers every 3 seconds
                document.getElementById('avatar1').classList.toggle('active', currentSpeaker === 1);
                document.getElementById('avatar2').classList.toggle('active', currentSpeaker === 2);
                
                currentSpeaker = currentSpeaker === 1 ? 2 : 1;
            }, 3000);
        }

        function updateProgress() {
            const progress = (audioElement.currentTime / audioElement.duration) * 100;
            progressFill.style.width = progress + '%';
            currentTimeEl.textContent = formatTime(audioElement.currentTime);
        }

        function handleEnded() {
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-flex';
            resetAvatars();
        }

        function resetAvatars() {
            document.getElementById('avatar1').classList.remove('active');
            document.getElementById('avatar2').classList.remove('active');
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showStatus(element, message, type) {
            element.textContent = message;
            element.className = 'status show ' + type;
        }
    </script>
</body>
</html>
