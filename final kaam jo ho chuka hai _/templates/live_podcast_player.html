<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Live Animated Podcast Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .upload-area {
            border: 3px dashed #2a5298;
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f5ff;
            border-color: #1e3c72;
        }

        .upload-area.uploading {
            background: #e3f2fd;
            border-color: #1976d2;
        }

        #audioFile {
            display: none;
        }

        .player-section {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .player-section.show {
            display: block;
        }

        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            height: 400px;
        }

        .avatar-container.active {
            box-shadow: 0 0 30px rgba(42, 82, 152, 0.8);
            border: 3px solid #2a5298;
        }

        .avatar-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .avatar-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .controls {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            font-weight: bold;
            color: #333;
            min-width: 100px;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .speaker-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .speaker-info h3 {
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .speaker-tag {
            display: inline-block;
            background: #2a5298;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            margin: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Live Animated Podcast Player</h1>
            <p>Upload audio and watch avatars come to life with automatic speaker detection</p>
        </div>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 4em; margin-bottom: 15px;">🎵</div>
                <h2 style="margin-bottom: 10px;">Drop your podcast audio here</h2>
                <p style="color: #666; margin-bottom: 15px;">or click to browse</p>
                <p style="color: #999; font-size: 0.9em;">Supports: MP3, WAV, OGG</p>
            </div>
            <input type="file" id="audioFile" accept="audio/*">
            <div class="status" id="uploadStatus"></div>
        </div>

        <!-- Player Section -->
        <div class="player-section" id="playerSection">
            <!-- Speaker Info -->
            <div class="speaker-info" id="speakerInfo"></div>

            <!-- Avatars Grid -->
            <div class="avatars-grid" id="avatarsGrid"></div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-primary" id="playBtn">
                    <span>▶️</span>
                    <span>Play</span>
                </button>
                <button class="btn btn-primary" id="pauseBtn" style="display:none;">
                    <span>⏸️</span>
                    <span>Pause</span>
                </button>
                <button class="btn btn-primary" id="stopBtn">
                    <span>⏹️</span>
                    <span>Stop</span>
                </button>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
            </div>

            <div class="status" id="playerStatus"></div>
        </div>
    </div>

    <script>

        let audioElement = null;
        let segments = [];
        let animationFrame = null;
        let avatarCanvases = [];

        const uploadArea = document.getElementById('uploadArea');
        const audioFile = document.getElementById('audioFile');
        const uploadStatus = document.getElementById('uploadStatus');
        const playerSection = document.getElementById('playerSection');
        const avatarsGrid = document.getElementById('avatarsGrid');
        const speakerInfo = document.getElementById('speakerInfo');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const playerStatus = document.getElementById('playerStatus');

        // Upload handlers
        uploadArea.addEventListener('click', () => audioFile.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f0f5ff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '';
            if (e.dataTransfer.files.length > 0) {
                handleUpload(e.dataTransfer.files[0]);
            }
        });

        audioFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleUpload(e.target.files[0]);
            }
        });

        async function handleUpload(file) {
            try {
                showStatus(uploadStatus, 'Uploading and analyzing audio...', 'info');
                uploadArea.classList.add('uploading');

                const formData = new FormData();
                formData.append('audio', file);

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                showStatus(uploadStatus, `✓ Detected ${data.num_speakers} speakers! Loading avatars...`, 'success');

                // Initialize player
                await initializePlayer(data);

                uploadArea.classList.remove('uploading');
                playerSection.classList.add('show');

            } catch (error) {
                showStatus(uploadStatus, 'Error: ' + error.message, 'error');
                uploadArea.classList.remove('uploading');
                console.error(error);
            }
        }

        async function initializePlayer(data) {
            // Store data
            segments = data.segments;
            
            // Create audio element
            audioElement = new Audio(data.audio_url);
            
            // Display speaker info
            speakerInfo.innerHTML = `
                <h3>👥 Detected ${data.num_speakers} Speakers</h3>
                ${data.avatars.map(a => `<span class="speaker-tag">${a.speaker_id}: ${a.name}</span>`).join('')}
            `;

            // Create avatar containers with canvas
            avatarsGrid.innerHTML = '';
            avatarCanvases = [];
            
            for (let i = 0; i < data.avatars.length; i++) {
                const avatarData = data.avatars[i];
                const container = document.createElement('div');
                container.className = 'avatar-container';
                container.id = `avatar-${avatarData.id}`;
                
                const canvas = document.createElement('canvas');
                canvas.className = 'avatar-canvas';
                canvas.id = `canvas-${avatarData.id}`;
                canvas.width = 400;
                canvas.height = 400;
                
                const label = document.createElement('div');
                label.className = 'avatar-label';
                label.textContent = `${avatarData.speaker_id}: ${avatarData.name}`;
                
                container.appendChild(canvas);
                container.appendChild(label);
                avatarsGrid.appendChild(container);

                // Store canvas info
                avatarCanvases.push({
                    canvas: canvas,
                    ctx: canvas.getContext('2d'),
                    container: container,
                    speaker_id: avatarData.speaker_id,
                    index: i
                });

                // Draw initial avatar
                drawAvatar(canvas.getContext('2d'), canvas.width, canvas.height, i, false);
            }

            showStatus(playerStatus, 'Ready to play!', 'success');
        }

        function drawAvatar(ctx, width, height, index, mouthOpen = false) {
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Colors
            const skinColor = index === 0 ? '#ffdbac' : '#f4c2c2';
            const bodyColor = index === 0 ? '#4a90e2' : '#e24a90';
            const hairColor = index === 0 ? '#4a3728' : '#8b4513';
            
            // Draw body
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(centerX, centerY + 80, 60, 100, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw neck
            ctx.fillStyle = skinColor;
            ctx.fillRect(centerX - 20, centerY + 20, 40, 40);
            
            // Draw head
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(centerX, centerY - 20, 70, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw hair
            ctx.fillStyle = hairColor;
            ctx.beginPath();
            ctx.arc(centerX, centerY - 50, 75, Math.PI, Math.PI * 2);
            ctx.fill();
            
            // Draw ears
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.ellipse(centerX - 70, centerY - 20, 15, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(centerX + 70, centerY - 20, 15, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(centerX - 25, centerY - 30, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 25, centerY - 30, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw pupils
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX - 25, centerY - 30, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 25, centerY - 30, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw eyebrows
            ctx.strokeStyle = hairColor;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(centerX - 40, centerY - 50);
            ctx.lineTo(centerX - 10, centerY - 45);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(centerX + 40, centerY - 50);
            ctx.lineTo(centerX + 10, centerY - 45);
            ctx.stroke();
            
            // Draw nose
            ctx.strokeStyle = '#d4a574';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - 10);
            ctx.lineTo(centerX - 5, centerY + 5);
            ctx.lineTo(centerX + 5, centerY + 5);
            ctx.stroke();
            
            // Draw mouth
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (mouthOpen) {
                // Open mouth (talking)
                ctx.ellipse(centerX, centerY + 20, 25, 15, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#8b0000';
                ctx.fill();
            } else {
                // Closed mouth (smiling)
                ctx.arc(centerX, centerY + 10, 25, 0, Math.PI);
            }
            ctx.stroke();
        }

        // Playback controls
        playBtn.addEventListener('click', () => {
            audioElement.play();
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-flex';
            startAnimation();
        });

        pauseBtn.addEventListener('click', () => {
            audioElement.pause();
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-flex';
        });

        stopBtn.addEventListener('click', () => {
            audioElement.pause();
            audioElement.currentTime = 0;
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-flex';
            resetAvatars();
        });

        function startAnimation() {
            function update() {
                const currentTime = audioElement.currentTime;
                const duration = audioElement.duration;

                // Update progress
                const progress = (currentTime / duration) * 100;
                progressFill.style.width = progress + '%';
                timeDisplay.textContent = formatTime(currentTime) + ' / ' + formatTime(duration);

                // Update active speaker
                updateActiveSpeaker(currentTime);
                
                // Animate avatars
                animateAvatars();

                if (!audioElement.paused) {
                    animationFrame = requestAnimationFrame(update);
                }
            }
            update();
        }

        function animateAvatars() {
            avatarCanvases.forEach(av => {
                const isActive = av.container.classList.contains('active');
                const mouthOpen = isActive && Math.sin(Date.now() * 0.01) > 0;
                drawAvatar(av.ctx, av.canvas.width, av.canvas.height, av.index, mouthOpen);
            });
        }

        function updateActiveSpeaker(currentTime) {
            // Find current segment
            const currentSegment = segments.find(s => 
                currentTime >= s.start && currentTime <= s.end
            );

            // Update avatar states
            avatarCanvases.forEach(av => {
                const isActive = currentSegment && currentSegment.speaker === av.speaker_id;
                av.container.classList.toggle('active', isActive);
            });
        }

        function resetAvatars() {
            avatarCanvases.forEach(av => {
                av.container.classList.remove('active');
                drawAvatar(av.ctx, av.canvas.width, av.canvas.height, av.index, false);
            });
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showStatus(element, message, type) {
            element.textContent = message;
            element.className = 'status show ' + type;
        }
    </script>
</body>
</html>
