<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Podcast Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4E00; /* Ember/Coral Orange */
            --primary-hover: #E03E00;
            --accent: #FF8C00;
            --bg-base: #0a0a0a;
            --surface: rgba(30, 30, 30, 0.6);
            --surface-hover: rgba(45, 45, 45, 0.8);
            --text-main: #f8f8f8;
            --text-muted: #9e9e9e;
            --border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .bg-orbs {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: #FF4E00;
            top: -100px; left: -100px;
            animation-duration: 25s;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: #FF8C00;
            bottom: -200px; right: -100px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: #CC2200;
            top: 40%; left: 60%;
            animation-duration: 30s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 2.5rem;
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 3rem; }

        .title-gradient {
            background: linear-gradient(to right, #FF8C00, #FF4E00, #FF2000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: rgba(15, 15, 15, 0.4);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 78, 0, 0.3);
        }

        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block; margin-bottom: 0.6rem;
            color: #d1d1d1; font-weight: 500; font-size: 0.95rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        option { background-color: #1a1a1a; color: white; }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(255, 78, 0, 0.15);
        }

        button {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine 3s infinite reverse;
        }
        @keyframes shine { 100% { left: 200%; } }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 78, 0, 0.4);
        }
        button:disabled {
            background: #333; cursor: not-allowed; color: #888;
        }
        button:disabled::after { display: none; }

        /* Fancy Loader Sequence */
        .stage-loader {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 1rem; border-radius: 12px; background: rgba(0,0,0,0.2); margin-top: 1rem;
        }
        .stage-loader.active { display: flex; animation: fadeIn 0.4s ease; }
        .stage-text { margin-top: 10px; font-weight: 500; color: var(--accent); }
        .bouncing-bars { display: flex; gap: 4px; }
        .bar {
            width: 4px; height: 16px; background: var(--primary); border-radius: 4px;
            animation: bounce 1s infinite alternate;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 16px; } 100% { height: 32px; background: #FF8C00; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Speaker Analysis Roster */
        .speakers-roster {
            display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; display: none;
        }
        .speakers-roster.active { display: flex; animation: fadeIn 0.5s ease; }
        .speaker-card {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; transition: transform 0.2s;
        }
        .speaker-card:hover { transform: scale(1.02); border-color: rgba(255, 255, 255, 0.2); }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 10px rgba(255, 78, 0, 0.3);
        }
        .speaker-details h4 { margin-bottom: 2px; color: #fff; }
        .speaker-details p { font-size: 0.85rem; color: var(--text-muted); }

        /* Audio Visualizer */
        .result-area { margin-top: 2rem; display: none; text-align: center; }
        .result-area.active { display: block; animation: fadeIn 0.6s ease; }
        #visualizer {
            width: 100%; height: 100px;
            background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 1rem;
            border: 1px solid var(--border); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        #audioPlayer { width: 100%; border-radius: 30px; outline: none; }
        
        .download-btn {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 1.5rem; padding: 0.8rem 1.5rem;
            background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 30px;
            text-decoration: none; font-weight: 600; transition: all 0.3s;
        }
        .download-btn:hover { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="title-gradient">🎙️ AI Podcast Studio</h1>
            <p style="color: var(--text-muted); font-size: 1.25rem;">Stunning, multilingual, and emotionally expressive.</p>
        </header>

        <div class="grid">
            <!-- Left Column: Input -->
            <div class="card">
                <h2 style="color: white; margin-bottom: 20px;">1. Blueprint</h2>
                <div class="form-group">
                    <label>Podcast Topic or Title</label>
                    <input type="text" id="title" placeholder="E.g., The Future of Artificial Intelligence">
                </div>
                <div class="form-group">
                    <label>Blog Content / Source Material</label>
                    <textarea id="content" rows="6" placeholder="Paste the full text here to be transformed into a dynamic conversation..."></textarea>
                </div>
                <div class="grid" style="gap: 1rem; grid-template-columns: 1fr 1fr; margin-bottom: 1rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Format</label>
                        <select id="podcastType">
                            <option value="single">1 Host (Solo)</option>
                            <option value="co-host" selected>2 Hosts (Dialogue)</option>
                            <option value="panel">3 Hosts (Panel)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Language & Vibe</label>
                        <select id="language">
                            <option value="global">English (Global)</option>
                            <option value="indian" selected>Hinglish (India)</option>
                            <option value="telugu">Telugu</option>
                            <option value="french">French</option>
                            <option value="spanish">Spanish</option>
                        </select>
                    </div>
                </div>
                <!-- Background Music Selection -->
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Background Vibe</label>
                    <select id="bgMusic">
                        <option value="none">None</option>
                        <option value="intro">Podcast intro</option>
                        <option value="soft" selected>Soft music</option>
                        <option value="news">News style</option>
                    </select>
                </div>
                
                <button id="generateScriptBtn">
                    <span id="btnScriptText">Ignite AI Generation</span>
                </button>
                
                <div class="stage-loader" id="scriptLoader">
                    <div class="bouncing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <div class="stage-text" id="scriptStageText">Crafting brilliant dialogues...</div>
                </div>
            </div>

            <!-- Right Column: Script & Audio -->
            <div class="card">
                <h2 style="color: white; margin-bottom: 20px;">2. Studio</h2>
                <div class="form-group">
                    <label>Generated Script</label>
                    <textarea id="scriptOutput" rows="6" placeholder="Your generated script will surface here. Feel free to tweak it!"></textarea>
                </div>
                
                <!-- Dynamic Speaker Roster -->
                <div class="speakers-roster" id="speakerRoster">
                    <h3 style="font-size: 1rem; color: #fff; margin-bottom: 5px;">🎤 Casting Roster</h3>
                    <div id="rosterContainer"></div>
                </div>
                
                <button id="generateAudioBtn" style="margin-top: 1.5rem; background: linear-gradient(45deg, #FF8C00, #FF4E00);" class="hidden">
                    <span id="btnAudioText">Synthesize Voices & Render</span>
                </button>

                <div class="stage-loader" id="audioLoader">
                    <div class="bouncing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <div class="stage-text" id="audioStageText">Warming up vocal chords...</div>
                </div>
                
                <div class="result-area" id="audioResult">
                    <h3 style="margin-bottom: 1rem; color: var(--accent);">Your Masterpiece is Ready 🎧</h3>
                    <canvas id="visualizer"></canvas>
                    <audio id="audioPlayer" controls crossorigin="anonymous"></audio>
                    <a id="downloadLink" href="#" class="download-btn">Download MP3 <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const btnScript = document.getElementById('generateScriptBtn');
        const btnAudio = document.getElementById('generateAudioBtn');
        const scriptLoader = document.getElementById('scriptLoader');
        const audioLoader = document.getElementById('audioLoader');
        const scriptStageText = document.getElementById('scriptStageText');
        const audioStageText = document.getElementById('audioStageText');
        
        const scriptOutput = document.getElementById('scriptOutput');
        const speakerRoster = document.getElementById('speakerRoster');
        const rosterContainer = document.getElementById('rosterContainer');
        
        const audioResult = document.getElementById('audioResult');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');
        const btnScriptText = document.getElementById('btnScriptText');
        const btnAudioText = document.getElementById('btnAudioText');

        // Audio Visualizer Setup
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioContext, analyser, source, dataArray;
        
        function setupVisualizer() {
            // Setup sizing
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Only set up once
            if(audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                source = audioContext.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                drawVisualizer();
            } catch (e) {
                console.warn("Audio Context unable to mount (browser security restriction until interaction)");
            }
        }

        // Must resume context on play if it was suspended
        audioPlayer.addEventListener('play', () => {
            setupVisualizer();
            if(audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            if(!analyser) return;

            analyser.getByteFrequencyData(dataArray);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;
            
            for(let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i] / 2;
                
                // Ember-like gradient depending on intensity
                let r = barHeight + (25 * (i/dataArray.length));
                let g = 100 * (i/dataArray.length);
                let b = 50;
                
                ctx.fillStyle = `rgb(${r+100},${g},${b})`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        // Timed loading text flipper
        function animateLoading(elem, messages) {
            let i = 0;
            elem.innerText = messages[0];
            const interval = setInterval(() => {
                i = (i + 1) % messages.length;
                elem.innerText = messages[i];
            }, 2500);
            return interval;
        }

        btnScript.addEventListener('click', async () => {
            const content = document.getElementById('content').value;
            const title = document.getElementById('title').value;
            const type = document.getElementById('podcastType').value;
            const language = document.getElementById('language').value;

            if (!content) {
                alert("Please provide some source content first!"); return;
            }

            // UI State change
            btnScript.disabled = true;
            btnScriptText.innerText = "Generating...";
            scriptLoader.classList.add('active');
            speakerRoster.classList.remove('active');
            btnAudio.classList.add('hidden');
            audioResult.classList.remove('active');
            scriptOutput.value = "";

            const loaderInt = animateLoading(scriptStageText, [
                "Drafting brilliant dialogues...",
                "Injecting human emotion...",
                "Structuring the narrative...",
                "Final polish before rendering..."
            ]);

            try {
                const res = await fetch('/api/ai-generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content, title, podcast_type: type, audience: language })
                });
                const data = await res.json();
                
                if(data.success) {
                    scriptOutput.value = data.script;
                    
                    // Trigger Speaker Analysis automatically
                    await analyzeScript(data.script, language);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Connection error');
            } finally {
                clearInterval(loaderInt);
                btnScript.disabled = false;
                btnScriptText.innerText = "Regenerate AI Script";
                scriptLoader.classList.remove('active');
            }
        });

        async function analyzeScript(script, language) {
            try {
                scriptStageText.innerText = "Analyzing cast & voices...";
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ script, language })
                });
                const data = await res.json();
                
                if(data.success && data.speakers > 0) {
                    rosterContainer.innerHTML = '';
                    
                    for (const [name, info] of Object.entries(data.speaker_info)) {
                        const card = document.createElement('div');
                        card.className = 'speaker-card';
                        
                        // Pick first letter of name for Avatar
                        const initial = name.charAt(0).toUpperCase();
                        
                        card.innerHTML = `
                            <div class="avatar">${initial}</div>
                            <div class="speaker-details">
                                <h4>${name}</h4>
                                <p>${info.voice} — ${info.engine}</p>
                            </div>
                            <div style="margin-left: auto;">
                                <select class="emotion-select" data-speaker="${name}" style="padding: 0.4rem; border-radius: 8px; font-size: 0.85rem; width: 110px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--border);">
                                    <option value="auto">Auto (AI)</option>
                                    <option value="neutral">Neutral</option>
                                    <option value="excited">Excited</option>
                                    <option value="calm">Calm</option>
                                    <option value="serious">Serious</option>
                                </select>
                            </div>
                        `;
                        rosterContainer.appendChild(card);
                    }
                    
                    speakerRoster.classList.add('active');
                    btnAudio.classList.remove('hidden'); // Reveal audio render button
                }
            } catch(e) {
                console.error("Failed to analyze script", e);
                // Still allow rendering even if analysis fails visually
                btnAudio.classList.remove('hidden');
            }
        }

        btnAudio.addEventListener('click', async () => {
            const script = scriptOutput.value;
            if(!script) return;
            
            const language = document.getElementById('language').value;
            const bgMusic = document.getElementById('bgMusic').value;
            
            const emotionSelects = document.querySelectorAll('.emotion-select');
            const emotionOverrides = {};
            emotionSelects.forEach(select => {
                if(select.value !== 'auto') {
                    emotionOverrides[select.dataset.speaker] = select.value;
                }
            });

            btnAudio.disabled = true;
            btnAudioText.innerText = "Rendering...";
            audioLoader.classList.add('active');
            audioResult.classList.remove('active');

            const loaderInt = animateLoading(audioStageText, [
                "Allocating voice vectors...",
                "Synthesizing speech segments...",
                "Applying emotional modulation...",
                "Stitching and mastering audio...",
                "Finalizing MP3 export..."
            ]);

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ script, name: 'mastered_podcast', language, bg_music: bgMusic, emotion_overrides: emotionOverrides })
                });
                const data = await res.json();
                
                if(data.success) {
                    // Force cache bypass by appending timestamp so re-runs play updated audio
                    audioPlayer.src = '/api/stream/' + data.filename + '?t=' + Date.now();
                    downloadLink.href = '/api/download/' + data.filename;
                    downloadLink.download = "My_AI_Podcast.mp3";
                    
                    audioResult.classList.add('active');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch(e) {
                alert('Generation failed');
            } finally {
                clearInterval(loaderInt);
                btnAudio.disabled = false;
                btnAudioText.innerText = "Synthesize Podcast Audio";
                audioLoader.classList.remove('active');
            }
        });
        
        // Setup initial canvas sizing
        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    </script>
</body>
</html>
